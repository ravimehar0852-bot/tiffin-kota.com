<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Dashboard | TiffinKota</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f8f6f2;
}

header{
    background:#6B1E1E;
    color:white;
    padding:18px;
    text-align:center;
}

.profile-card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.profile-card img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
}

.profile-card h2{
    text-align:center;
    margin:15px 0 5px;
}

.profile-card p{
    text-align:center;
    color:gray;
}

.menu{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    margin-top:10px;
}

.logout{
    margin:20px;
}

.logout button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#6B1E1E;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>Customer Dashboard</h1>

</header>

<div class="profile-card">

<img src="https://ui-avatars.com/api/?name=Customer" id="profileImage">

<h2 id="customerName">Loading...</h2>

<p id="customerEmail">Loading...</p>

</div>

<div class="menu">

<div class="card" onclick="location.href='index.html'">
🍱
<h3>Browse Shops</h3>
</div>

<div class="card">
🛒
<h3>My Cart</h3>
</div>

<div class="card">
📦
<h3>My Orders</h3>
</div>

<div class="card">
📍
<h3>Addresses</h3>
</div>

<div class="card">
❤️
<h3>Wishlist</h3>
</div>

<div class="card">
⚙️
<h3>Profile</h3>
</div>

</div>

<div class="logout">

<button id="logoutBtn">
Logout
</button>

</div>

<script type="module">

import { auth } from "./js/firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";

return;

}

document.getElementById("customerName").innerHTML=user.displayName || "Customer";

document.getElementById("customerEmail").innerHTML=user.email || user.phoneNumber;

if(user.photoURL){

document.getElementById("profileImage").src=user.photoURL;

}

});

document.getElementById("logoutBtn").onclick=async()=>{

await signOut(auth);

window.location.href="login.html";

};

</script>

</body>
</html>
